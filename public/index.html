<!DOCTYPE html>

  <head>

      "areaServed": ["Andhra Pradesh", "Telangana", "India"],

        "telephone": "+91-9000000001",
        "contactType": "customer support",

        "availableLanguage": ["English", "Telugu"],
        "contactOption": "TollFree",
        "areaServed": "IN"

        "@type": "PostalAddress",

      "name": "TokenWalla",

      "description": "Book doctor appointments online in AP & Telangana. Skip hospital queues with digital tokens.",

        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",

    <!-- ── Structured Data: FAQPage ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How does TokenWalla work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Find a doctor, pick a date and time slot, pay ₹15 securely via Razorpay, and get a digital token instantly. Track your live queue position from anywhere and walk in right on time."
          }
        },
        {
          "@type": "Question",
          "name": "Is TokenWalla available in Andhra Pradesh?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, TokenWalla is currently live in Andhra Pradesh and Telangana, covering multiple hospitals and cities including Hindupur and surrounding areas."
          }
        },
        {
          "@type": "Question",
          "name": "How much does it cost to book a doctor appointment on TokenWalla?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TokenWalla charges ₹15 per appointment which includes a confirmed token and live queue tracking. Payments are secured by Razorpay."
          }
        },
        {
          "@type": "Question",
          "name": "Can I cancel my appointment?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, you can cancel a waiting appointment from My Bookings at least 2 hours before your slot. Refunds are processed within 5-7 business days."
          }
        },
        {
          "@type": "Question",
          "name": "How do I track my position in the hospital queue?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "After booking, your token page shows your live queue position, updated every 15 seconds. You'll know exactly when to leave for the hospital."
          }
        }
      ]
    }
